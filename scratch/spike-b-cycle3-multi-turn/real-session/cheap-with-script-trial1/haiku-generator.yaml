name: haiku-generator-cheap-with-script-trial1
description: Haiku generator with syllable validation - trial 1

agents:
  - name: haiku-writer
    model_profile: haiku
    system_prompt: |
      You are a haiku poet. Write exactly ONE haiku (3 lines, 5-7-5 syllables)
      about the topic provided. Output ONLY the haiku, nothing else.
      
      Topic: {topic}

  - name: syllable-validator
    script: scratch/spike-b-cycle3-multi-turn/real-session/cheap-with-script-trial1/haiku_syllables.py
    depends_on: [haiku-writer]
