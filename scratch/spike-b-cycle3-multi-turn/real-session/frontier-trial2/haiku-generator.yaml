name: haiku-generator-frontier-trial2
description: Generates a haiku on a given topic and validates the 5-7-5 syllable count

agents:
  - name: haiku-author
    model_profile: default-sonnet
    system_prompt: |
      You are a haiku poet. When given a topic, write a single haiku in the
      strict 5-7-5 syllable format. Respond with ONLY the three lines of the
      haiku, nothing else — no titles, no explanations, no labels. Three lines,
      each on its own line.

  - name: syllable-validator
    script: scripts/haiku_syllables.py
    depends_on: [haiku-author]
    parameters:
      strict: true
      expected_pattern: [5, 7, 5]
