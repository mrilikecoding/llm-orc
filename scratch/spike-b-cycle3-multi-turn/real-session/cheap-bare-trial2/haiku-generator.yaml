name: haiku-generator-cheap-bare-trial2
description: Generate haiku with 5-7-5 syllable validation

agents:
  - name: haiku-writer
    model_profile: haiku
    system_prompt: "Write a haiku (5-7-5 syllable structure) about any topic of your choice. Output ONLY the haiku - three lines, no additional text."
    depends_on: []

  - name: syllable-validator
    script: scratch/spike-b-cycle3-multi-turn/real-session/cheap-bare-trial2/haiku_syllables.py
    depends_on: [haiku-writer]
    parameters:
      haiku: "{{ haiku-writer.response }}"