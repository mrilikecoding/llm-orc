name: haiku-generator-cheap-with-script-trial2
description: Two-agent ensemble: write haiku, then validate 5-7-5 syllable structure

agents:
  - name: haiku_writer
    model_profile: haiku
    system_prompt: "Write a haiku about the user's topic. Output ONLY the haiku — three lines with 5, 7, and 5 syllables respectively. No preamble or explanation."

  - name: syllable_validator
    script: scratch/spike-b-cycle3-multi-turn/real-session/cheap-with-script-trial2/haiku_syllables.py
    depends_on: [haiku_writer]
