name: haiku-generator-cheap-bare-trial1
description: Generate a haiku about a topic and validate its syllable structure (5-7-5).

agents:
  - name: haiku-writer
    model_profile: haiku
    system_prompt: "Write a single haiku (3 lines, 5-7-5 syllable pattern) about the topic provided. Output ONLY the haiku, nothing else."
    parameters:
      topic: "cherry blossoms"

  - name: syllable-validator
    script: scratch/spike-b-cycle3-multi-turn/real-session/cheap-bare-trial1/haiku_syllables.py
    depends_on: [haiku-writer]