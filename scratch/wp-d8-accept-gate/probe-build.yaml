name: probe-build
description: |
  WP-D8 slice-3 probe: does a dependent code-generator node, receiving the
  criteria (base_input) + the test-writer's tests (dependency), produce code that
  PASSES those tests? Tests naming coordination (code names the function to match
  the tests) + build-against-tests tractability. Throwaway probe, not shipped.
agents:
  - name: test_writer
    ensemble: test-writer

  - name: code_writer
    ensemble: code-generator
    depends_on: [test_writer]
