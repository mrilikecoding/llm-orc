name: spike-omega-p3-full
description: |
  Ω-P3 — the FULL agentic serving flow as ONE declarative ensemble (engine
  handoff #1, Phase 3). No Python driver: every stage is a node.

    resolve-contract : loop  -> architect-repair cycle until the contract is
                               coherent (the validated Ω-loop, deterministic body)
    plan             : script-> project output.contract into per-file build tasks,
                               each carrying the full contract for sibling context
    build            : ensemble + fan_out -> one build sub-ensemble per file;
                               inside it: classify -> guarded code-loop / prose
                               branch -> marshal (closed capability set => guard,
                               not dynamic dispatch)
    score            : script-> gather the built files (stand-in execution gate)

  Free arm: deterministic architect + stand-in builders. To run it for real, swap
  the loop body to spike-omega-loop-body-live (paid frontier architect) and the
  build stand-ins to cheap local tiers.
agents:
  - name: resolve-contract
    loop:
      body: spike-omega-loop-body-converge
      until: ${ok}
      carry: ${next_input}
      max_iterations: 3

  - name: plan
    script: scripts/spike-omega-p3/plan_from_contract.py
    depends_on: [resolve-contract]

  - name: build
    ensemble: spike-omega-p3-build-one
    depends_on: [plan]
    input_key: tasks
    fan_out: true

  - name: score
    script: scripts/spike-omega-p3/score.py
    depends_on: [build]
