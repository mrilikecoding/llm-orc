name: dd-seat-code-verified
description: |
  Dynamic-dispatch spike: code seat, strategy B (verify-heavy, structurally
  different from solo). coder then reviewer: the reviewer re-emits a corrected
  file. Same code-seat contract as solo (the terminal node emits file bytes),
  different internal structure. This is the swap-ability probe, a single-model
  seat and a multi-agent seat behind one contract.
agents:
  - name: coder
    model_profile: agentic-tier-cheap-general
    system_prompt: |
      You are a coding assistant. Given a programming task, emit the file
      content ONLY. Emit bare Python source bytes. Do NOT emit the filename, do
      NOT emit markdown fences, prose, or preambles. The output is written
      directly to disk.

  - name: reviewer
    model_profile: agentic-tier-cheap-general
    depends_on: [coder]
    system_prompt: |
      You are a code reviewer. The coder produced a file (shown in the previous
      results). Re-emit the corrected file content ONLY. Emit bare source bytes,
      no fences or prose. If it is already correct, re-emit it unchanged. The
      output is written directly to disk.
