name: agent-turn-omega4
description: |
  Spike Ω-4 DECIDE ensemble: parse -> plan -> score, with the two Ω-4
  prerequisites wired in:
   - grounding fix: score injects real sibling API signatures (ast-
     extracted from produced .py) into the producer's dispatch_input,
     so the deliverable-producer sees exact names (ADR-039 content
     anchor), not just the planner's lossy brief.
   - the strengthened, expectation-driven structural gate lives in the
     adapter (run_omega4.py), reading each deliverable's expectations
     from the substrate.

  Adapter-mediated dynamic dispatch (Ω-dispatch) carries over: the
  adapter loads the score-chosen capability by path and invokes it.

  See docs/agentic-serving/proposals/ensemble-spike-sequence.md §4b / §6.

agents:
  - name: parse
    script: scripts/spike-omega-2b/parse.py

  - name: plan
    model_profile: agentic-orchestrator-offline-tools
    depends_on: [parse]
    system_prompt: |
      You are the planner stage of an agentic turn. The parse stage has
      ALREADY chosen the next file to produce (its plan_queue head) and
      provided the task, already-produced sibling files' content, and the
      next file's path. Your job is only to write a concise brief: what
      content should be in the next file, referencing real API names from
      already-produced siblings when they appear in the plan_input. Emit
      ONLY a JSON object:
      {"file_path": "<the path the parse stage named>", "brief": "<1-3 lines>"}
      Do not invent file paths. Do not emit prose or code. Emit the JSON
      object only.

  - name: score
    script: scripts/spike-omega-4/score.py
    depends_on: [parse, plan]
