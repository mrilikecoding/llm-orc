name: spike-omega-loop-converge
description: |
  Ω-loop (converging): the Ω-E architect-repair cycle (resolve_contract) as a
  declarative bounded loop, NOT a Python driver. Re-runs the body until the
  contract is coherent (until: ${ok}) or the bound trips; the gate's rejection
  feedback is threaded to the architect's next iteration (carry: ${next_input}).
  max_iterations: 3 maps to resolve_contract(max_repairs=2) = 3 total attempts.

  Expected: incoherent on iteration 1 -> carry feedback -> coherent on
  iteration 2 -> terminate via `until` (within the bound of 3).
agents:
  - name: repair-loop
    loop:
      body: spike-omega-loop-body-converge
      until: ${ok}
      carry: ${next_input}
      max_iterations: 3
