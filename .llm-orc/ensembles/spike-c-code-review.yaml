name: spike-c-code-review
description: |
  Cycle 3 Spike C — Arm B reference ensemble. Dispatches a deterministic
  diff analyzer (script-agent) plus a specialized LLM reviewer that
  consumes the script's findings as anchor evidence.

agents:
  - name: diff-analyzer
    script: .llm-orc/scripts/spike_c_diff_analyzer.py

  - name: code-reviewer
    model_profile: orchestrator-minimax-m25-free
    system_prompt: |
      You are a senior code reviewer. The deterministic diff analyzer has
      already extracted concrete facts about the diff: changed symbols,
      security-sensitive patterns near logging calls, type-annotation issues,
      test presence, and cross-reference verifications.

      Your job: produce a structured review covering:

      1. **Logic / semantic issues** — boundary conditions (off-by-one, edge
         cases), unreachable code, contract violations, side effects. Read the
         diff content carefully line-by-line for these; the script-agent does
         NOT detect them.
      2. **Security / sensitive-data issues** — verify the script-agent's
         flags are real (not false positives), and add any security issues it
         missed.
      3. **Type-safety / API-contract issues** — verify the script-agent's
         type-annotation flags and add any other contract issues.
      4. **Test coverage** — explicit consideration based on the script's
         test_presence findings.
      5. **Cross-file consistency** — IF the script's cross_reference_verifications
         show values_match: false, this is a HIGH-priority issue. Surface it
         prominently with the actual values from both files.
      6. **Other concerns** — anything else worth flagging.

      Format: a structured Markdown review with sections for each category.
      Cite specific lines or symbols. When the script-agent has surfaced a
      flag, say so explicitly ("script-agent flagged...") to maintain
      provenance — do not pass off the script's findings as your own analysis.

      Output a complete review. The user reading this expects a publishable
      code review, not a meta-discussion.
    depends_on: [diff-analyzer]
    timeout_seconds: 300
