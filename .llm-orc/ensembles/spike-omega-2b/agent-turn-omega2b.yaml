name: agent-turn-omega2b
description: |
  Spike Ω-2b: the agent-turn-omega2 ensemble with recovery-aware parse
  and dispatch-shim stages. On a validate failure, the harness (acting
  as the between-turn adapter) re-invokes this ensemble for the SAME
  file with the rejection feedback in last_tool_result. parse surfaces
  it as recovery_hint; dispatch-shim appends the exact ast error +
  "re-emit only this file" to the code-generator input, verbatim.

  This tests whether adapter-side retry (bespoke's ADR-041 self-healing
  re-dispatch, relocated from in-process to between-turn) makes the
  3-file task converge — the thing the Ω-2 form could not do. No engine
  primitive: the retry loop lives in the adapter, the hint rides the
  existing request fields, the substrate stays the cross-run store.

  See docs/agentic-serving/proposals/ensemble-spike-sequence.md §4b.

agents:
  - name: parse
    script: scripts/spike-omega-2b/parse.py

  - name: plan
    model_profile: agentic-orchestrator-offline-tools
    depends_on: [parse]
    system_prompt: |
      You are the planner stage of an agentic turn. The parse stage has
      ALREADY chosen the next file to produce (its plan_queue head) and
      provided the task, already-produced sibling files' content, and
      the next file's path. Your job is only to write a concise brief:
      what content should be in the next file, referencing real API
      names from already-produced siblings when they appear in the
      plan_input. Emit ONLY a JSON object:
      {"file_path": "<the path the parse stage named>", "brief": "<1-3 lines describing what to produce>"}
      Do not invent file paths. Do not emit prose or code. Emit the JSON
      object only.

  - name: dispatch-shim
    script: scripts/spike-omega-2b/dispatch_shim.py
    depends_on: [parse, plan]

  - name: code-generator
    ensemble: code-generator-omega
    depends_on: [dispatch-shim]
    input_key: dispatch_input

  - name: validate
    script: scripts/spike-omega/validate.py
    depends_on: [code-generator]

  - name: marshal
    script: scripts/spike-omega-2b/marshal.py
    depends_on: [parse, dispatch-shim, validate]
