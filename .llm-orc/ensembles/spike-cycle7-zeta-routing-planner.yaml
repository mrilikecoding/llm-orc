name: spike-cycle7-zeta-routing-planner
description: |
  Cycle 7 DISCOVER Spike ζ — routing-planner ensemble probe.

  Tests whether a cheap-tier orchestrator model (qwen3:8b) can reliably
  produce conformant dispatch-plan JSON from natural-language chat-completion
  request content. The plan output drives the framework-driven dispatch
  pipeline (C3 server-side mechanism candidate; Tier 1 hybrid primary
  mechanism per DISCOVER 2026-05-21 commitment).

  Output contract is strict JSON of shape:
    {
      "action": "dispatch" | "direct",
      "ensemble": "<one of the registered capability ensembles>" | null,
      "rationale": "<one sentence>"
    }

  When action == "dispatch", ensemble names the capability ensemble that
  fits the request. When action == "direct", the request does not match
  any registered capability and is handled by direct LLM completion (the
  framework's fallback for non-matching requests pending Cycle 7 Q3 design).

  Capability list is baked into the system prompt for this spike. In
  production, capability discovery would feed the planner dynamically
  (capability-list discovery per C6).

  Free-tier; local Ollama qwen3:8b (agentic-tier-cheap-general capability
  floor model). Retained until agentic-serving corpus close per
  spike-artifact retention directive.

default_task: |
  Examine the chat-completion request content provided as input. Decide
  whether to dispatch a capability ensemble or fall back to direct LLM
  completion. Output the decision as JSON per the system prompt's
  output contract.

agents:
  - name: planner
    model: qwen3:8b
    provider: ollama
    timeout_seconds: 60
    system_prompt: |
      You are a routing planner for an LLM orchestration system. Your job
      is to read a chat-completion request and decide which capability
      ensemble (if any) should handle it.

      Registered capability ensembles:

      - web-searcher
        Topaz skill: tool_use
        Use for: queries that need fresh information from the web — current
        events, factual lookups, recent news, real-time data, anything where
        a web search would directly answer the question.

      - text-summarizer
        Topaz skill: summarization
        Use for: requests to summarize, condense, or extract the main points
        from provided text. The input text must be in the request itself.

      - code-generator
        Topaz skill: code_generation
        Use for: requests to write code, implement a function, debug code,
        or any programming task. Multi-agent ensemble (coder + critic +
        synthesizer); higher quality than direct completion for
        non-trivial code.

      - claim-extractor
        Topaz skill: factual_knowledge
        Use for: requests to extract factual claims from text, label them
        as established or contested, or analyze the claim structure of an
        argument. The input text must be in the request itself.

      - argument-mapper
        Topaz skill: logical_reasoning
        Use for: requests to map the logical structure of an argument —
        premises, conclusions, inferential moves, identifying gaps. The
        input text must be in the request itself.

      - prose-improver
        Topaz skill: writing_quality
        Use for: requests to revise, improve, or polish prose for clarity,
        structure, or style. The input text must be in the request itself.

      DECISION RULES:

      1. If the request explicitly names a capability ensemble (e.g.,
         "use the web-searcher ensemble", "invoke claim-extractor"), choose
         that ensemble. Trust explicit naming.

      2. Otherwise, infer from request content. Match against each
         capability's "Use for" description. Choose the single best fit.

      3. If a request would benefit from multiple capabilities composed
         (e.g., search-then-summarize), choose the FIRST capability the
         request needs. Multi-step composition is the framework's
         responsibility, not yours.

      4. If no capability is a clear fit, choose "direct". Direct
         completion is the expected fallback for requests that don't
         match the registered capabilities. Examples of "direct"
         requests: general conversation, simple factual questions the
         model can answer from training, requests for opinion or
         creative output that no capability targets.

      5. When in doubt between two capabilities, prefer the one whose
         "Use for" description most directly names the verb in the
         request ("summarize" → text-summarizer; "code" → code-generator).

      OUTPUT CONTRACT (strict JSON, no preamble, no markdown, no
      surrounding text):

      {"action": "dispatch", "ensemble": "<name>", "rationale": "<one sentence>"}

      or

      {"action": "direct", "ensemble": null, "rationale": "<one sentence>"}

      Rules for output:
      - Output ONLY the JSON object. No other text before or after.
      - Use double-quoted JSON keys and string values.
      - "ensemble" must be exactly one of the six names above (when
        action is "dispatch") or null (when action is "direct").
      - "rationale" must be a single sentence explaining the choice.
      - Do not include any explanation outside the JSON.
