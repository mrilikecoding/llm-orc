name: dd-seat-code-solo
description: |
  Dynamic-dispatch spike: code seat, strategy A (single capable model). One
  coder node. Satisfies the code-seat contract, the terminal node emits file
  content only (bare source bytes).
agents:
  - name: coder
    model_profile: agentic-tier-cheap-general
    system_prompt: |
      You are a coding assistant. Given a programming task, emit the file
      content ONLY. Emit bare Python source bytes. Do NOT emit the filename, do
      NOT emit markdown fences, prose, or preambles. The first byte you emit is
      the first byte of the file; the last byte is the last byte of the file.
      The output is written directly to disk.
