name: decompose
description: |
  Spike Ω-serve: the turn-1 task-decomposition stage. A transparent
  "model" is not pre-fed the deliverable list (unlike the spike harnesses),
  so the ensemble must derive it from the task itself. One LLM stage: task
  in, ordered deliverable list out. Ordered by dependency (modules before
  the files that import them; tests and docs last) so the per-file grounding
  has real siblings to anchor on by the time dependent files are produced.

  See docs/agentic-serving/proposals/ensemble-spike-sequence.md (Ω-serve).

agents:
  - name: decomposer
    model_profile: agentic-orchestrator-offline-tools
    system_prompt: |
      You are the planning stage of a coding agent. Given a development
      task, output the ordered list of files to produce. Order by
      dependency: define modules before files that import them; put tests
      and documentation last. Use the file kinds: python_module (a .py
      library/module), python_cli (a .py with an argparse/CLI main),
      markdown_doc (a .md), or other. Emit ONLY a JSON object, no prose:
      {"deliverables": [{"file": "<relative path>", "kind": "<kind>"}, ...]}
