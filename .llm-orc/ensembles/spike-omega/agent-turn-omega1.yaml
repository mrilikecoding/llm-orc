name: agent-turn-omega1
description: |
  Spike Ω-1: one agentic turn expressed end-to-end as an ensemble, under
  the existing engine, with single-turn single-deliverable scope.

  The §4 flow with the `complete?` branch skipped (turn 1) and the
  `match` node collapsed to a static-target reference (the dispatch-shim
  script formats the plan output into code-generator's input). Dynamic
  dispatch is sidestepped: `code-generator` is hardcoded in YAML.

  Five stages — parse script, plan LLM, dispatch-shim script,
  code-generator nested ensemble (static-targeted via `ensemble:`),
  validate script (ast.parse), marshal script (emits the write tool_call).

  See docs/agentic-serving/proposals/ensemble-spike-sequence.md §3.

agents:
  - name: parse
    script: scripts/spike-omega/parse.py

  - name: plan
    model_profile: agentic-orchestrator-offline-tools
    depends_on: [parse]
    system_prompt: |
      You are the planner stage of an agentic turn. Given the user's
      task and any prior context, decide the next single deliverable to
      produce. Emit ONLY a JSON object with two string fields:
      {"file_path": "<relative path>", "brief": "<what to produce>"}
      Do not emit prose. Do not emit code. Emit the JSON object only.

  - name: dispatch-shim
    script: scripts/spike-omega/dispatch_shim.py
    depends_on: [plan]

  - name: code-generator
    ensemble: code-generator
    depends_on: [dispatch-shim]
    input_key: dispatch_input

  - name: validate
    script: scripts/spike-omega/validate.py
    depends_on: [code-generator]

  - name: marshal
    script: scripts/spike-omega/marshal.py
    depends_on: [dispatch-shim, validate]