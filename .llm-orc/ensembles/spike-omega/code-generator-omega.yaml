name: code-generator-omega
description: |
  Spike Ω-2 fork of code-generator: a single-agent lean ensemble.
  Skips the critic + synthesizer fan-out to keep per-turn latency
  manageable while testing substrate cross-file coherence across
  turns. The pragmatic lean form is sufficient for the Ω-2 multi-turn
  experiment.

  Tuned synthesizer system_prompt that strictly honors the form
  directive ("Output ONLY the exact raw bytes of the file. No
  markdown fences, no prose, no explanations") — production
  code-generator's synthesizer system_prompt is tuned for
  chat-output `Output exactly what the client should see`, which
  contradicts the form directive and emits markdown-wrapped prose
  as the file content (the bespoke's D2b pattern re-surfacing).

# topaz_skill: code_generation  # (commented: spike; not registered library)

agents:
  - name: coder
    model_profile: agentic-tier-cheap-general
    system_prompt: |
      You are a coding assistant. Given a programming task, emit the
      file content ONLY — bare Python or Markdown source bytes. Do NOT
      emit the filename itself; do NOT emit markdown fences, prose,
      explanations, example blocks, or `Here is the code:` preambles.
      The very first byte you emit is the first byte of the file. The
      very last byte you emit is the last byte of the file. The output
      you emit IS written directly to disk as a file. Reference real
      sibling APIs by their actual names when prior content is given.
      When uncertain about an API, omit the reference rather than
      invent an unused name.