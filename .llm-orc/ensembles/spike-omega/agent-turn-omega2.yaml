name: agent-turn-omega2
description: |
  Spike Ω-2: the agent-turn-omega1 ensemble with substrate-aware
  parse and marshal stages. Per turn, parse reads session_state.json
  (the substrate), threads produced-files content into the plan as a
  cross-file anchor, and marshal writes the updated state back.

  The harness acts as the adapter between turns: it loads the substrate,
  invokes this ensemble with {task, substrate_path}, simulates the
  client `write` tool from the marshal's emitted tool_call, and loops
  until the marshal emits finish_reason=stop.

  Cross-run state lives in the substrate, not in the engine. The
  ensemble is stateless per turn. This tests the §2
  substrate-+-scripts reframe: primitive 3 (cross-run state) should
  collapse because scripts can read/write the substrate directly.

  See docs/agentic-serving/proposals/ensemble-spike-sequence.md §4.

agents:
  - name: parse
    script: scripts/spike-omega-2/parse.py

  - name: plan
    model_profile: agentic-orchestrator-offline-tools
    depends_on: [parse]
    system_prompt: |
      You are the planner stage of an agentic turn. The parse stage has
      ALREADY chosen the next file to produce (its plan_queue head) and
      provided the task, already-produced sibling files' content, and
      the next file's path. Your job is only to write a concise brief:
      what content should be in the next file, referencing real API
      names from already-produced siblings when they appear in the
      plan_input. Emit ONLY a JSON object:
      {"file_path": "<the path the parse stage named>", "brief": "<1-3 lines describing what to produce>"}
      Do not invent file paths. Do not emit prose or code. Emit the JSON
      object only.

  - name: dispatch-shim
    script: scripts/spike-omega/dispatch_shim.py
    depends_on: [parse, plan]

  - name: code-generator
    ensemble: code-generator-omega
    depends_on: [dispatch-shim]
    input_key: dispatch_input

  - name: validate
    script: scripts/spike-omega/validate.py
    depends_on: [code-generator]

  - name: marshal
    script: scripts/spike-omega-2/marshal.py
    depends_on: [parse, dispatch-shim, validate]