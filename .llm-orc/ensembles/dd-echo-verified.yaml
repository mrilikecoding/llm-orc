name: dd-echo-verified
description: |
  Dynamic-dispatch spike: deterministic echo seat for the no-model smoke
  (verified shape, two nodes, structurally different from dd-echo-solo). The
  terminal node is review, so the smoke proves marshal reads the seat's terminal
  output through a multi-node seat.
agents:
  - name: build
    script: "echo 'x = 1  # VERIFIED-CODE'"
  - name: review
    script: "echo 'x = 1  # VERIFIED-CODE'"
    depends_on: [build]
