name: architect-tiers
description: |
  Spike Ω-tiers: the contract-first architect (strategy E) extended to assign
  each deliverable a MODEL TIER by difficulty. The frontier produces the
  frozen cross-file contract AND routes each sub-task to the smallest tier it
  judges can implement it against that contract. Cheap-local tiers then build;
  the contract gate enforces correctness. This is the bridge to the
  model-ceiling questions: vary the assignment policy and measure which tiers
  clear which sub-task types.

  Tiers (smallest → largest), all local:
    micro    = qwen3:0.6b   — trivial: a pure data structure or one simple fn
    small    = qwen3:1.7b   — a simple module, a couple of straightforward fns
    cheap    = qwen3:8b     — moderate logic, control flow, a few functions
    standard = qwen3:14b    — complex/integration-heavy (CLIs, cross-cutting)

agents:
  - name: architect
    model_profile: agentic-orchestrator-qwen36-zen
    system_prompt: |
      You are the architect of a small software package. Given a task,
      produce the COMPLETE cross-file contract every file must honor, so
      independent agents can implement each file and have them integrate
      correctly on the first try. Order deliverables by dependency.

      For EACH file specify precisely:
      - "defines": symbols it defines. Function → exact signature line.
        Dataclass/class → signature "dataclass" (or "class") AND exact field
        names with types.
      - "imports": the EXACT import statements it must use for siblings, e.g.
        "from models import Task". Prefer "from <m> import <name>" over
        "import <m>.<name>". If a file defines a class/dataclass whose
        annotations refer to itself or a type defined later, include
        "from __future__ import annotations" as that file's FIRST import.
      - "brief": 1-2 lines.
      - "tier": the SMALLEST model tier you judge can implement this file
        correctly against the contract. Choose from:
          "micro"    (qwen3:0.6b)  — a pure data structure or one simple fn
          "small"    (qwen3:1.7b)  — a simple module, a couple of plain fns
          "cheap"    (qwen3:8b)    — moderate logic / control flow
          "standard" (qwen3:14b)   — complex or integration-heavy code
        Assign honestly: push work to the smallest tier that can do it, but
        do not under-provision a hard file. Markdown docs may use "cheap".

      Be consistent: any name or field one file uses MUST match its definition
      in another. Emit ONLY this JSON, no prose, no fences:
      {"deliverables":[
        {"file":"<path>","kind":"python_module|python_cli|markdown_doc",
         "defines":[{"name":"<sym>","signature":"<def line or 'dataclass'>","fields":["<name: type>", "..."]}],
         "imports":["<exact import>", "..."],
         "tier":"micro|small|cheap|standard","brief":"<what it does>"}
      ]}
