name: web-searcher
description: |
  Script-agent capability ensemble that satisfies the `tool_use` Topaz
  slot via an external web-search API. Per ADR-020: the `tool_use`
  slot is the only Topaz skill requiring actual external action (not
  just LLM-text generation), so the ensemble's "agent" is a Python
  script wrapping a search-API adapter rather than an LLM Model
  Profile.

  Three adapters ship: `ddgs` (DuckDuckGo via the `ddgs` package;
  no key required; the default), `kagi` (paid; reads KAGI_API_TOKEN),
  and `tavily` (paid; reads WEB_SEARCH_API_KEY). Default is `ddgs`
  so fresh-clone deployments work without authentication setup; paid
  backends are explicit opt-in via WEB_SEARCH_BACKEND=<name>. Operators
  can extend with additional adapters by adding a `_search_<backend>`
  function and registering it in `BACKEND_ADAPTERS` in
  `scripts/agentic_serving/web_searcher.py`.

  Tagged `tool_use` per the Topaz eight-skill taxonomy (ADR-015). The
  `tool_use` tier abstraction is **degenerate** for script-agents —
  script execution is deterministic, with no Model Profile to swap
  between cheap and escalated tiers. The per_skill_tier_defaults for
  `tool_use` reference the same profile for both tiers (no-op tier
  escalation, acknowledged in ADR-020 §Consequences §Negative); the
  Calibration Gate's post-hoc result-check (ADR-007) still fires on
  the structured JSON result.

  The script surfaces backend failures (authentication, rate limit,
  network) as structured error objects rather than raising — the
  orchestrator's reasoning surface acts on the error shape.

topaz_skill: tool_use

# ADR-025 §"Scope: always, for capability ensembles" — deliverable
# routes through SessionArtifactStore; envelope.artifacts[0] carries
# the typed reference. AS-7 amended: result-summarizer is skipped.
#
# Per Cycle 6 DECIDE snapshot Finding 1 advisory carry-forward: this
# ensemble is migrated EARLY in Cycle 6 WP-E's per-ensemble migration
# specifically so ADR-025's dial-back falsification Indicator 1
# (latency overhead for deliverables under 1 KB) and Indicator 4
# (output_substrate: inline opt-out count) are testable before the
# rest of the library migrates. The size-floor tradeoff is most
# pronounced for web-searcher (already-handle-shaped JSON records);
# operational evidence here is load-bearing for the dial-back
# deliberation triggered by Indicator firing.
output_substrate: artifact

# ADR-024 (Cycle 6 WP-D): operator-declared shape for envelope.structured.
# The script agent already returns structured JSON shaped per the
# adapter's response contract (results array; each entry carries
# url + title + snippet). Dispatch attempts JSON parse advisorily;
# when the script's response is the JSON document it natively returns,
# envelope.structured carries the typed shape downstream consumers can
# parse without re-parsing the prose primary. Per Cycle 6 WP-E entry
# decision (WP-D snapshot moderate advisory 1 resolution): schema is
# documentary; the script's native JSON output already produces
# structured envelopes when parsed.
output_schema:
  type: object
  properties:
    results:
      type: array
      items:
        type: object
        required: [url]
        properties:
          url:
            type: string
          title:
            type: string
          snippet:
            type: string
    error:
      type: object
      properties:
        kind:
          type: string
        message:
          type: string

default_task: |
  Search the web for the provided query. Return top results with
  URLs and snippets.

agents:
  - name: searcher
    script: scripts/agentic_serving/web_searcher.py
