name: serving
description: |
  The Cycle-8 declarative Serving Ensemble: the per-turn handler as ONE
  ensemble (classify -> seat -> marshal) on the L0 engine (ADR-046 §1; AS-11 —
  the agent's control flow lives in the ensemble, not an imperative driver).

  classify (decider node) emits {target, kind, file, dispatch_input, build};
  seat is filled by dynamic dispatch on ${classify.target}, resolved at the
  phase layer (the shared ${dep.field} resolver), receiving dispatch_input via
  input_key; the marshal sub-sequence (shape -> form-gate -> emit) turns the
  seat's ADR-024 envelope into the serve outcome. shape reads the deliverable
  from the envelope faithfully (content from the envelope, destination from
  classify); form-gate refuses a deliverable that does not parse as its path
  claims; emit shapes the client-seam outcome (a file write for a valid build,
  a prose finish otherwise). Swapping a seat strategy is a change to the
  classify decision or the operator/registry default, never to this skeleton.

  The registry the seat resolves against is stubbed at TS-1 (resolve-by-name);
  WP-C8 builds the Topaz-keyed registry + shape catalog.

agents:
  - name: classify
    script: scripts/agentic_serving/classify.py

  - name: seat
    dispatch: "${classify.target}"
    input_key: dispatch_input
    depends_on: [classify]

  - name: shape
    script: scripts/agentic_serving/shape.py
    depends_on: [classify, seat]

  - name: form_gate
    script: scripts/agentic_serving/form_gate.py
    depends_on: [shape]

  - name: emit
    script: scripts/agentic_serving/emit.py
    depends_on: [form_gate]
