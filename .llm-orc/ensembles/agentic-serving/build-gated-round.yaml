name: build-gated-round
description: |
  The Cycle-8 gated build shape (WP-D8): a build turn as a composed verification
  pipeline (the practitioner's TDD shape — test-writer -> code-writer -> verifier
  gate). classify routes an executable-deliverable turn here; the shape produces
  the code AND an independent accept verdict, and the serving marshal surfaces
  both (ODP-2: the client owns the accept/another-round loop).

  Pipeline:
    test_writer   tests-first: acceptance criteria -> pytest-style tests
    code_writer   code-generator, builds code that passes those tests
    gather        assemble {requirement, code, tests} for the executor
    executor      deterministic, sandboxed: runs the tests against the code
    judge         isolated: are the tests adequate to verify the criteria?
    accept_gate   accept = tests_pass AND tests_adequate (orthogonal catches)
    envelope      ADR-024 deliverable + accept verdict in diagnostics

  Independence (ADR-048 §3): the verifier seats (executor, judge) receive only
  {criteria, produced code, produced tests, execution result}, never builder
  reasoning. The executor is deterministic ground truth; the judge is a
  fresh-context reviewer. Composed from shipped primitives + seats (AS-11).

  Richer shapes (elicitation-first, oracle rungs, per-round budgets) are
  operator-curated catalog work at WP-C8.

# The retry-loop body (issue #89): one gated round. Not registry-facing —
# no topaz_skill (it must not register as a capability part) and no serves
# (it is not a catalog shape); it is resolved only by its loop node.

agents:
  - name: test_writer
    ensemble: test-writer

  - name: code_writer
    ensemble: code-generator
    depends_on: [test_writer]

  - name: gather
    script: scripts/agentic_serving/accept_gather.py
    depends_on: [test_writer, code_writer]

  - name: executor
    script: scripts/agentic_serving/accept_executor.py
    depends_on: [gather]

  - name: judge
    # the shared adequacy seat (#84): prompt and profile live in
    # adequacy-judge.yaml, so the measurement harness (benchmarks/
    # judge_adequacy) exercises the exact seat this round runs
    ensemble: adequacy-judge
    depends_on: [executor]
    # verifier isolation (ADR-048): the judge reads the executor's echoed
    # contract only, never the shape's base input (which may carry threaded
    # conversation context)
    input_scope: dependencies

  - name: accept_gate
    script: scripts/agentic_serving/accept_gate.py
    depends_on: [executor, judge]

  - name: envelope
    script: scripts/agentic_serving/build_gated_envelope.py
    depends_on: [code_writer, executor, accept_gate]
