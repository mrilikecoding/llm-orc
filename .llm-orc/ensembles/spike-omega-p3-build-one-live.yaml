name: spike-omega-p3-build-one-live
description: |
  Ω-P3 (live): the per-file build sub-ensemble with REAL cheap-local generators.
  classify recovers the chunk and builds the dispatch prompt; build-code /
  build-prose are mutually-exclusive GUARDED branches routing to the real
  cheap-local capabilities (qwen3:8b); marshal cleans the fired branch's output
  into the file. One generation pass per file (the form-gate retry loop is proven
  to compose in spike Ω-P3 3c; omitted here to keep the paid run tractable —
  the execution gate reports the truth).
agents:
  - name: classify
    script: scripts/spike-omega-p3/classify_live.py

  - name: build-code
    ensemble: code-generator-omega
    depends_on: [classify]
    input_key: dispatch_input
    when: ${classify.is_code}

  - name: build-prose
    ensemble: prose-generator-omega
    depends_on: [classify]
    input_key: dispatch_input
    when: ${classify.is_doc}

  - name: marshal
    script: scripts/spike-omega-p3/marshal_live.py
    depends_on: [classify, build-code, build-prose]
