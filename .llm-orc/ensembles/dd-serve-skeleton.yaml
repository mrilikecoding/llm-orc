name: dd-serve-skeleton
description: |
  Dynamic-dispatch spike: the classify -> seat -> marshal serve skeleton, as ONE
  declarative ensemble. The seat is filled by dynamic dispatch on
  ${classify.target}, resolved at the phase layer (guard-sibling). This reunifies
  what the Ω-dispatch spike had to split into decide-ensemble + adapter-invoke +
  finalize (agent-turn-dispatch.yaml, whose docstring notes the engine could not
  resolve a runtime-chosen `ensemble:` target): the runtime-chosen target now
  resolves inside the engine, so the whole turn is one ensemble again.

  classify emits {target, kind, file, dispatch_input}; the seat receives the
  dispatch_input payload via input_key and is chosen by target; marshal shapes
  the seat output into the serve outcome (file write for code, prose finish for
  an explanation). Swapping a seat strategy is a change to the classify decision
  or the operator default, never to this skeleton.
agents:
  - name: classify
    script: scripts/spike-dynamic-dispatch/classify.py

  - name: seat
    dispatch: "${classify.target}"
    input_key: dispatch_input
    depends_on: [classify]

  - name: marshal
    script: scripts/spike-dynamic-dispatch/marshal.py
    depends_on: [classify, seat]
