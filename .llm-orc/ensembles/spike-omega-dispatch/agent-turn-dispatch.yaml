name: agent-turn-dispatch
description: |
  Spike Ω-dispatch DECIDE ensemble: parse -> plan -> score. Terminal
  output is the dispatch decision (chosen capability + dispatch_input +
  the capability's file path). It does NOT invoke the capability — the
  engine cannot resolve a runtime-chosen `ensemble:` target (ensemble_
  runner.py:66 reads a static YAML string). The adapter (harness) reads
  this decision and invokes the chosen capability itself — the §8
  adapter-mediated dispatch, the only way to get script-initiated
  dynamic dispatch without an L0 engine primitive.

  This split (decide-ensemble + adapter-invoke + finalize) IS the result:
  dynamic dispatch costs the single-turn ensemble its monolithic shape.

  See docs/agentic-serving/proposals/ensemble-spike-sequence.md §4b / §5.

agents:
  - name: parse
    script: scripts/spike-omega-2b/parse.py

  - name: plan
    model_profile: agentic-orchestrator-offline-tools
    depends_on: [parse]
    system_prompt: |
      You are the planner stage of an agentic turn. The parse stage has
      ALREADY chosen the next file to produce (its plan_queue head) and
      provided the task, already-produced sibling files' content, and the
      next file's path. Your job is only to write a concise brief: what
      content should be in the next file, referencing real API names from
      already-produced siblings when they appear in the plan_input. Emit
      ONLY a JSON object:
      {"file_path": "<the path the parse stage named>", "brief": "<1-3 lines>"}
      Do not invent file paths. Do not emit prose or code. Emit the JSON
      object only.

  - name: score
    script: scripts/spike-omega-dispatch/score.py
    depends_on: [parse, plan]
