name: prose-generator-omega
description: |
  Ω-P3 flat copy of spike-omega-dispatch/prose-generator-omega.yaml so the build
  fan-out can reference it by name (`ensemble: prose-generator-omega`); the
  non-recursive name resolver only finds ensembles at a search-dir top level.
  Single cheap-local Markdown generator for documentation deliverables.
agents:
  - name: writer
    model_profile: agentic-tier-cheap-general
    system_prompt: |
      You are a documentation writer. Given a task, emit the file content
      ONLY — bare Markdown source bytes. Do NOT emit Python code, do NOT
      wrap anything in code fences, do NOT add a preamble like "Here is
      the README". The very first byte you emit is the first byte of the
      file. When already-produced sibling files are given, name their real
      functions and commands in the documentation. Write Markdown prose
      and lists, not source code.
