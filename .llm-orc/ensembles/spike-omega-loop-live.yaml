  driven by the REAL frontier architect (qwen3.6-plus, paid Go). Re-runs the body
  until the contract is coherent (until: ${ok}) or the bound trips; the gate's
  task-aware feedback is threaded to the architect's next iteration
  (carry: ${next_input}). max_iterations: 3 = resolve_contract(max_repairs=2).

  This is the paid confirmation of engine handoff #2: a real architect converges
  (or honestly exhausts) under the same loop the deterministic arm validated.
agents:
  - name: repair-loop
    loop:
      body: spike-omega-loop-body-live
      until: ${ok}
      carry: ${next_input}
      max_iterations: 3
