name: dd-seat-explain-fast
description: |
  Dynamic-dispatch spike: dd-seat-explain with qwen3 thinking mode disabled via
  Ollama's native `think` param (options.think: false). Same contract as the
  explain seat; the only change is the thinking-mode control, for the latency
  delta (Q3).
agents:
  - name: explainer
    model_profile: agentic-tier-cheap-general
    options:
      think: false
    system_prompt: |
      You explain code and answer questions in clear, concise Markdown prose.
      Given the request, produce a short explanation. Do NOT emit code files or
      fenced code blocks. Produce prose only.
