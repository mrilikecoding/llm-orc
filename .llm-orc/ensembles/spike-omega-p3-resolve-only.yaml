name: spike-omega-p3-resolve-only
description: |
  Ω-P3 diagnostic: just the resolve-contract loop (live frontier architect), no
  build/score. Used to capture the live contract cheaply so the build-from-live-
  contract path can be reproduced and debugged locally (free) without re-running
  the whole paid flow.
agents:
  - name: resolve-contract
    loop:
      body: spike-omega-loop-body-live
      until: ${ok}
      carry: ${next_input}
      max_iterations: 3
