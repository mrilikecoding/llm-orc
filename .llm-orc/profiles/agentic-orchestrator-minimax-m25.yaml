# Agentic-serving — paid MiniMax M2.5 orchestrator profile (Cycle 6 PLAY 2026-05-20).
#
# Paid tier of MiniMax M2.5 via OpenCode Zen. Same provider as
# agentic-orchestrator.yaml (free tier), different model identifier.
# Reuses the openai-compatible/zen auth already configured (`llm-orc auth list`
# shows `openai-compatible/zen: API key`). Unblocks PLAY-phase curl probes
# when the free-tier quota window has been exhausted by another session
# (one OpenCode session can exhaust the free quota for the diagnostic
# window).
#
# To activate: set `agentic_serving.orchestrator.model_profile` in
# `.llm-orc/config.yaml` to `agentic-orchestrator-minimax-m25`.
# To revert: set it back to `agentic-orchestrator` (free tier).
name: agentic-orchestrator-minimax-m25
model: minimax-m2.5
provider: openai-compatible/zen
base_url: https://opencode.ai/zen/v1
cost_per_token: 0.0
timeout_seconds: 180
