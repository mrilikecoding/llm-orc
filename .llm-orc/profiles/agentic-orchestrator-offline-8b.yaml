# Agentic-serving — 8b offline orchestrator (Spike τ arm S: single-small-model).
#
# Same OpenAI-compatible/ollama adapter as `agentic-orchestrator-offline-tools`
# (supports_tool_calling = True, satisfies the orchestrator's tool-calling
# requirement), but qwen3:8b instead of qwen3:14b — so the seat AND the coder
# are the same single resident local model, eliminating the 8b<->14b swap on a
# 32GB machine. Tests whether a single small model can sequence multi-file work.
#
# Activate by setting `agentic_serving.orchestrator.model_profile` to
# `agentic-orchestrator-offline-8b` in `.llm-orc/config.yaml`.
name: agentic-orchestrator-offline-8b
model: qwen3:8b
provider: openai-compatible/ollama
base_url: http://localhost:11434/v1
cost_per_token: 0.0
timeout_seconds: 300
