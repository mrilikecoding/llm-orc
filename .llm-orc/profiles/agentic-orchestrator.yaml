# Agentic-serving — default orchestrator profile (Cycle 5 / ADR-011 / ADR-019).
#
# Cheap-cloud orchestrator via OpenCode Zen (free tier). Aligns with
# essay 005's "cheap-cloud-orchestrator routes; local models amplify
# deterministic and bounded-scope ensemble work." Must be tool-call-
# capable — the orchestrator dispatches via the closed 5-tool internal
# surface (list_ensembles / invoke_ensemble / compose_ensemble /
# query_knowledge / record_outcome) per ADR-003.
#
# Swap pattern: edit this file's `model:` / `provider:` / `base_url:`
# fields to change the orchestrator. The `agentic_serving:` section
# in `.llm-orc/config.yaml` references this profile by name; no
# config.yaml edit required.
name: agentic-orchestrator
model: minimax-m2.5-free
provider: openai-compatible/zen
base_url: https://opencode.ai/zen/v1
cost_per_token: 0.0
timeout_seconds: 180
